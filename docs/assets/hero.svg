<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#1b263b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7fb8ff"/>
    </marker>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <text x="60" y="70" fill="#e0e6f0" font-size="34" font-weight="bold">HiSim — Mou et al. (2024)</text>
  <text x="60" y="108" fill="#9bb3d4" font-size="19">Agent-based Large-scale Social Movement Simulation</text>
  <text x="60" y="138" fill="#7fb8ff" font-size="16">Two-tier hybrid: LLM core + ABM periphery on a social network</text>

  <!-- Core tier (LLM-driven, few high-degree nodes) -->
  <g>
    <circle cx="320" cy="220" r="26" fill="#f4a259"/>
    <text x="320" y="225" fill="#1b263b" font-size="13" text-anchor="middle" font-weight="bold">LLM</text>
    <text x="320" y="270" fill="#f4a259" font-size="14" text-anchor="middle">Core (LLM)</text>
  </g>

  <!-- Ordinary tier (ABM-driven, the silent majority) -->
  <g fill="#5fb0b7">
    <circle cx="560" cy="190" r="13"/>
    <circle cx="630" cy="240" r="13"/>
    <circle cx="700" cy="195" r="13"/>
    <circle cx="600" cy="155" r="13"/>
    <circle cx="680" cy="255" r="13"/>
    <circle cx="540" cy="255" r="13"/>
  </g>
  <text x="620" y="290" fill="#5fb0b7" font-size="14" text-anchor="middle">Ordinary (ABM: BC / HK / SJ / Lorenz)</text>

  <!-- one-way coupling arrows core -> ordinary -->
  <g stroke="#7fb8ff" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M346,212 L545,192"/>
    <path d="M344,224 L616,158"/>
    <path d="M346,230 L617,238"/>
  </g>

  <!-- attitude axis -->
  <text x="900" y="150" fill="#e0e6f0" font-size="16">attitude a ∈ [-1, +1]</text>
  <line x1="900" y1="175" x2="1140" y2="175" stroke="#9bb3d4" stroke-width="2"/>
  <text x="900" y="200" fill="#9bb3d4" font-size="13">against</text>
  <text x="1095" y="200" fill="#9bb3d4" font-size="13">in favor</text>
  <text x="900" y="240" fill="#7fb8ff" font-size="13">BC/HK → consensus</text>
  <text x="900" y="262" fill="#f4a259" font-size="13">SJ/Lorenz → polarization</text>
</svg>
